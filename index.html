<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarFiberX - Login Premium</title>
    <style>
        /* Reset dan Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #333333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 420px;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Login Card */
        .login-card {
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(0, 150, 255, 0.2);
            color: #333333;
            background: #f8f9ff;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(0, 150, 255, 0.1);
        }

        /* Brand Header */
        .brand-header {
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 800;
            color: #0066cc;
            letter-spacing: 1px;
            margin-bottom: 2px;
            text-shadow: 0 2px 4px rgba(0, 102, 204, 0.2);
        }

        /* Running Text Container */
        .running-text-container {
            overflow: hidden;
            position: relative;
            width: 100%;
            height: 35px;
            margin-top: 1px;
            background: transparent;
        }

        .running-text-wrapper {
            display: flex;
            width: max-content;
            animation: scrollText 10s linear infinite;
        }

        .running-text {
            white-space: nowrap;
            padding: 15px 0;
            font-size: 0.8rem;
            color: #0066cc;
            font-weight: 500;
        }

        .highlight {
            color: #ff9900;
            font-weight: 600;
        }

        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Promo Container dengan Orbit */
        .promo-orbit-container {
            position: relative;
            height: 120px; /* Tinggi container diperbesar */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Promo Image sebagai Pusat Orbit */
        .promo-center {
            position: relative;
            z-index: 5;
            width: auto;
            max-width: 40%;
            animation: promoGlow 2s infinite alternate; /* Efek glow tambahan */
        }

        .promo-image {
            width: 100%;
            height: auto;
             transition: all 0.3s ease;
        }

        /* Efek Glow untuk Promo */
        @keyframes promoGlow {
            0% { 
                filter: drop-shadow(0 0 5px rgba(255, 153, 0, 0.3));
            }
            100% { 
                filter: drop-shadow(0 0 15px rgba(255, 102, 0, 0.6));
            }
        }

        /* Satelit yang mengelilingi promo */
        .satellite-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px; /* Diameter orbit */
            height: 180px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 102, 204, 0.2); /* Garis orbit tipis */
            animation: rotateOrbit 12s linear infinite;
            pointer-events: none;
        }

        .satellite {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #0096ff, #0066cc);
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.8);
            top: -6px; /* Posisi di atas orbit */
            left: 50%;
            transform: translateX(-50%);
        }


        @keyframes rotateOrbit {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes satelliteMove {
            0% {
                transform: rotate(0deg) translateX(90px) rotate(0deg);
            }
            100% {
                transform: rotate(360deg) translateX(90px) rotate(-360deg);
            }
        }

        /* Titik-titik orbit tambahan (efek bintang) */
        .orbit-dots {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 170px;
            height: 170px;
            border-radius: 50%;
            pointer-events: none;
        }

        .orbit-dots::before,
        .orbit-dots::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(0, 102, 204, 0.3);
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .orbit-dots::after {
            left: auto;
            right: 0;
            background: rgba(255, 153, 0, 0.3);
        }

        /* Login Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        .input-group {
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 1px solid #cccccc;
            border-radius: 8px;
            background: #ffffff;
            outline: none;
            color: #333333;
            text-align: center;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
            background: #ffffff;
        }

        .form-input::placeholder {
            color: #999999;
        }

        .submit-btn {
            background: linear-gradient(to right, #0066cc, #004999);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
            margin-top: 5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.3);
            background: linear-gradient(to right, #0077ee, #0055aa);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Messages */
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-top: 12px;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
            max-width: 300px;
            width: 100%;
            background: #f8f9ff;
            border: 1px solid #e0e0e0;
        }

        .error-message {
            color: #d32f2f;
            border-color: #ffcdd2;
            background: #ffebee;
        }

        .success-message {
            color: #2e7d32;
            border-color: #c8e6c9;
            background: #e8f5e9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        .footer-content {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            line-height: 1.5;
            width: 100%;
            background: transparent;
            color: #666666;
        }

        .footer-content a {
            color: #0066cc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-content a:hover {
            color: #004999;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 20px 15px;
            }
            
            .brand-name {
                font-size: 1.8rem;
            }
            
            .running-text-container {
                height: 30px;
            }
            
            .running-text {
                font-size: 0.75rem;
                padding: 8px 0;
            }
            
            .promo-orbit-container {
                height: 160px;
                margin: 10px 0 20px;
            }
            
            .satellite-orbit {
                width: 220px;
                height: 220px;
            }
            
            .promo-center {
                max-width: 60%;
            }
            
            @keyframes satelliteMove {
                0% { transform: rotate(0deg) translateX(70px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
            }
        }

    </style>
</head>
<body>

    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <!-- Brand Header -->
            <div class="brand-header">
                <div class="brand-name">StarFiberX</div>
                
                <!-- Running Text -->
                <div class="running-text-container">
                    <div class="running-text-wrapper">
                        <div class="running-text">
                            <span class="highlight">✨ Special Offer! ✨</span> Ijin Usaha/NIB: 1411240235819,
                            <span class="highlight">Voucher 5K -24 Jam,</span> Tersedia di Agen terdekat
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- PROMO SEBAGAI PUSAT DENGAN SATELIT MENGELILINGI -->
            <div class="promo-orbit-container">
                <!-- Gambar Promo sebagai pusat (menggantikan earth) -->
                <div class="promo-center">
                    <img src="promo.png" alt="Promo Spesial" class="promo-image">
                </div>
                
                <!-- Orbit dengan satelit mengelilingi promo -->
                <div class="satellite-orbit">
                    <div class="satellite"></div>
                </div>
                
                <!-- Satelit kedua dengan orbit berbeda (variasi) -->
                <div class="satellite-second"></div>
                
                <!-- Titik orbit dekoratif -->
                <div class="orbit-dots"></div>
            </div>
            
            <form class="login-form" autocomplete="off" name="login" action="$(link-login-only)" method="post">
                <input type="hidden" name="dst" value="$(link-orig)">
                <input type="hidden" name="popup" value="true">
                
                <div class="input-group">
                    <input class="form-input" name="username" type="text" 
                           placeholder="Masukkan Kode/Voucher Anda" 
                           value="" required autofocus id="usernameInput">
                </div>
                
                <button class="submit-btn" type="submit" id="loginButton">
                    <span class="btn-text">AKSES INTERNET</span>
                </button>
            </form>
            
            <!-- Messages -->
            <div id="errorMessage" class="message error-message">
                Tenang, coba lagi atau hubungi Customer Service.
            </div>
            
            <div id="successMessage" class="message success-message">
                Kode harus sesuai BossQu!
            </div>
            
            <!-- Footer -->
            <div class="footer-content">
                <p>CS: <a href="tel:+6285175002479">+62 851-7500-2479</a> (24 Jam)</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Form elements
            const loginForm = document.forms['login'];
            const usernameInput = document.getElementById('usernameInput');
            const loginButton = document.getElementById('loginButton');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Form submission
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault(); // Prevent default for demo

                // Reset states
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                loginButton.disabled = true;
                loginButton.innerHTML = 'Uji koneksi...';
                
                // Simulate connection
                setTimeout(() => {
                    // For demo, 100% success rate
                    if (Math.random() > 0.0) {
                        // If successful
                        successMessage.style.display = 'block';
                        loginButton.innerHTML = 'Kontak Satelit';
                        
                        // Submit the actual form
                        setTimeout(() => {
                            loginForm.submit();
                        }, 1500);
                    } else {
                        // Show error
                        errorMessage.style.display = 'block';
                        loginButton.innerHTML = '<span class="btn-text">COBA LAGI</span>';
                        loginButton.disabled = false;
                    }
                }, 1500);
            });
        });
    </script>
</body>
</html>
